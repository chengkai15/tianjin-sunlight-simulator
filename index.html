<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天津房屋采光模拟器</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>天津房屋采光模拟器</h1>
    </header>

    <main class="app-main">
      <!-- 控制面板区域 -->
      <section class="control-panel" aria-label="控制面板">

        <!-- 旋转控件 -->
        <div class="control-group">
          <h2 class="control-title">房屋朝向</h2>
          <div id="rotary-control" class="rotary-control" role="slider" aria-label="旋转控件调整房屋朝向" aria-valuemin="0" aria-valuemax="360" aria-valuenow="180">
            <span class="compass-label compass-n" aria-hidden="true">北</span>
            <span class="compass-label compass-e" aria-hidden="true">东</span>
            <span class="compass-label compass-s" aria-hidden="true">南</span>
            <span class="compass-label compass-w" aria-hidden="true">西</span>
            <div class="rotary-dial"></div>
          </div>
          <div class="orientation-input-group">
            <label for="orientation-input">朝向角度</label>
            <input id="orientation-input" type="number" min="0" max="360" step="1" value="180" aria-label="输入房屋朝向角度（0-360度）" />
            <span class="degree-symbol">°</span>
            <span id="direction-label" class="direction-label" aria-live="polite">南</span>
          </div>
        </div>

        <!-- 季节选择 -->
        <div class="control-group">
          <h2 class="control-title">季节选择</h2>
          <div id="season-selector" class="season-selector" role="radiogroup" aria-label="选择季节">
            <button type="button" class="season-btn" data-season="spring" role="radio" aria-checked="false">春分</button>
            <button type="button" class="season-btn" data-season="summer" role="radio" aria-checked="false">夏至</button>
            <button type="button" class="season-btn" data-season="autumn" role="radio" aria-checked="false">秋分</button>
            <button type="button" class="season-btn" data-season="winter" role="radio" aria-checked="false">冬至</button>
          </div>
          <div id="season-info" class="season-info" aria-live="polite">
            <span class="season-date"></span>
            <span class="season-sunrise">日出：--:--</span>
            <span class="season-sunset">日落：--:--</span>
          </div>
        </div>

        <!-- 时间滑块 -->
        <div class="control-group">
          <h2 class="control-title">时间选择</h2>
          <div class="time-slider-group">
            <input id="time-slider" type="range" min="5" max="19" step="0.1" value="12" aria-label="选择一天中的时刻" />
            <span id="time-display" class="time-display" aria-live="polite">12:00</span>
          </div>
        </div>

        <!-- 数据面板 -->
        <div class="control-group data-panel" aria-label="采光数据">
          <h2 class="control-title">采光数据</h2>
          <dl class="data-list">
            <div class="data-item">
              <dt>总日照时长</dt>
              <dd id="data-total-daylight">--</dd>
            </div>
            <div class="data-item">
              <dt>有效采光时长</dt>
              <dd id="data-effective-sunlight">--</dd>
            </div>
            <div class="data-item">
              <dt>太阳方位角</dt>
              <dd id="data-azimuth">--</dd>
            </div>
            <div class="data-item">
              <dt>太阳高度角</dt>
              <dd id="data-altitude">--</dd>
            </div>
          </dl>
        </div>

      </section>

      <!-- 可视化区域 -->
      <section class="visualization-area" aria-label="采光可视化">
        <canvas id="sunlight-canvas" aria-label="房屋采光模拟可视化画布">
          您的浏览器不支持 Canvas，请升级浏览器。
        </canvas>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
